spring.application.name=crms
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:crms}
spring.datasource.password=${DB_PASSWORD:crms}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
