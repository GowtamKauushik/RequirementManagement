services:
  mysql:
    image: mysql:8.4
    container_name: crms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crms
      MYSQL_USER: crms
      MYSQL_PASSWORD: crms
    ports:
      - "3306:3306"
    volumes:
      - crms-mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: crms-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/crms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=crms
      - DB_PASSWORD=crms
      - JWT_SECRET=change-this-secret-change-this-secret-change-this-secret
      - CORS_ALLOWED_ORIGIN=*
      - MAIL_USERNAME=gowthamkaushik7358@gmail.com
      - MAIL_PASSWORD=mvjz accx fwdj vlhs
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: crms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend

volumes:
  crms-mysql-data:
